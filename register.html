x<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The Round Room</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/Icon.png">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            width: 100%;
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            border-top: 4px solid var(--rr-text);
        }

        .auth-container h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--rr-bg);
            font-size: 1.75rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--rr-bg);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--rr-bg);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--rr-bg);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input::placeholder {
            color: rgba(109, 36, 48, 0.5);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--rr-text);
            box-shadow: 0 0 0 4px rgba(109, 36, 48, 0.15);
            background-color: rgba(109, 36, 48, 0.02);
        }

        .form-hint {
            font-size: 0.85rem;
            color: var(--rr-bg);
            margin-top: 0.4rem;
        }

        .error-message {
            color: #d32f2f;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.75rem;
            background-color: #ffebee;
            border-radius: 6px;
            display: none;
        }

        .error-message:not(:empty) {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--rr-bg);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .submit-btn:hover {
            background-color: #5a2238;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--rr-bg);
        }

        .auth-footer p {
            color: var(--rr-bg);
            margin: 0;
        }

        .auth-footer a {
            color: var(--rr-bg);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: var(--rr-text);
        }

        @media (max-width: 600px) {
            .auth-container {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }

            .auth-container h2 {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            .submit-btn {
                padding: 0.875rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="container">
            <button class="arrow" onclick="window.location.href='/'">
                <div class="bar4"></div>
                <div class="bar5"></div>
            </button>
            <div class="logo">
                <h1>THE ROUND ROOM</h1>
            </div>
            <img class="iconpic" src="webpimages/Icon.webp" alt="Logo">
        </div>
    </nav>

    <main class="section-s" style="padding-top: calc(var(--top-nav-height) + 3rem); padding-bottom: 3rem;">
        <div class="auth-container">
            <h2>Create Account</h2>

            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required />
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" minlength="8" required />
                    <div class="form-hint">Minimum 8 characters</div>
                </div>

                <div id="registerError" class="error-message"></div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login.html">Sign in</a></p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById("registerForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;
            handleRegister(email, phone, password, "registerError");
        });
    </script>
</body>
</html>
