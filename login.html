<!DOCTYPE html>
<!--
  FILE: login.html
  PURPOSE: User login page for authentication to access account features and discounts.
  
  NOTES:
  - Form submits to handleLogin() function in script.js
  - Supports redirect parameter to return users to previous page after login
  - Error messages displayed in #loginError element
  - Loading overlay shows during authentication request
  - Token stored in localStorage as rr_token on success
  - Links to register page with redirect preservation
  - Inline styles for auth-specific components
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Round Room</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/Icon.png">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            width: 100%;
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            border-top: 4px solid var(--rr-text);
            box-sizing: border-box;
        }

        .auth-container h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--rr-bg);
            font-size: 1.75rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--rr-bg);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--rr-bg);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--rr-bg);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input::placeholder {
            color: rgba(109, 36, 48, 0.5);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--rr-text);
            box-shadow: 0 0 0 4px rgba(109, 36, 48, 0.15);
            background-color: rgba(109, 36, 48, 0.02);
        }

        .error-message {
            color: #d32f2f;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.75rem;
            background-color: #ffebee;
            border-radius: 6px;
            display: none;
        }

        .error-message:not(:empty) {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--rr-bg);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .submit-btn:hover {
            background-color: #5a2238;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--rr-bg);
        }

        .auth-footer p {
            color: var(--rr-bg);
            margin: 0;
        }

        .auth-footer a {
            color: var(--rr-bg);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: var(--rr-text);
        }

        .auth-main {
            padding-top: calc(var(--top-nav-height) + 3rem);
            padding-bottom: 3rem;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        @media (max-width: 600px) {
            .auth-main {
                padding-top: calc(var(--top-nav-height) + 4rem);
                padding-bottom: 1.5rem;
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }

            .auth-container {
                margin: 0;
                padding: 1.5rem 1rem;
                border-radius: 10px;
            }

            .auth-container h2 {
                font-size: 1.35rem;
                margin-bottom: 1.1rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-group label {
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
            }

            .form-group input {
                font-size: 0.95rem;
                padding: 0.78rem 0.85rem;
            }

            .submit-btn {
                padding: 0.82rem;
                font-size: 0.95rem;
            }

            .auth-footer {
                margin-top: 1.25rem;
                padding-top: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="container">
            <button class="arrow" onclick="window.location.href='/'">
                <div class="bar4"></div>
                <div class="bar5"></div>
            </button>
            <div class="logo">
                <h1>THE ROUND ROOM</h1>
            </div>
            <img class="iconpic" src="webpimages/Icon.webp" alt="Logo">
        </div>
    </nav>

    <main class="section-s auth-main">
        <div class="auth-container">
            <h2>Login</h2>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required />
                </div>

                <div id="loginError" class="error-message"></div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register.html" id="registerLink">Create one</a></p>
            <script>
                // Pass redirect parameter to register page
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                if (redirect) {
                    document.getElementById('registerLink').href = '/register.html?redirect=' + encodeURIComponent(redirect);
                }
            </script>
            </div>
        </div>
    </main>

    <div class="auth-loading-overlay" id="authLoading" style="display: none;">
        <div class="auth-loading-spinner"></div>
        <p>Signing in...</p>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            handleLogin(email, password, "loginError", "authLoading");
        });
    </script>
    <style>
        .auth-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6d2430;
            border-radius: 50%;
            animation: authSpin 1s linear infinite;
        }
        @keyframes authSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .auth-loading-overlay p {
            margin-top: 1rem;
            font-family: 'Satoshi', sans-serif;
            color: #6d2430;
            font-size: 1rem;
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</body>
</html>
